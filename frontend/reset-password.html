<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードリセット - AgentTree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--surface-0);
      position: relative;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow-strong), transparent 70%);
      top: -150px;
      right: -150px;
      pointer-events: none;
    }
    .reset-container {
      background: var(--surface-1);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg), var(--shadow-glow);
      max-width: 420px;
      width: 100%;
      position: relative;
      z-index: 1;
    }
    .reset-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .reset-header h1 {
      color: var(--text-0);
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .reset-header p {
      color: var(--text-2);
      font-size: 0.85rem;
    }
    .password-requirements {
      margin-top: 5px;
      font-size: 0.78rem;
      color: var(--text-3);
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .alert-success {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.3);
      color: var(--success);
    }
    .alert-error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--error);
    }
    .back-to-login {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-to-login a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .back-to-login a:hover {
      text-decoration: underline;
    }
    .loading {
      display: none;
      text-align: center;
      margin-top: 1rem;
      color: var(--text-2);
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <div class="reset-header">
      <h1>パスワードリセット</h1>
      <p>新しいパスワードを設定してください</p>
    </div>

    <div id="alertContainer"></div>

    <form id="resetPasswordForm">
      <div class="form-group">
        <label for="newPassword">新しいパスワード</label>
        <input type="password" id="newPassword" name="newPassword" required minlength="8">
        <div class="password-requirements">
          ※ 8文字以上で入力してください
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">パスワード（確認）</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required>
      </div>

      <button type="submit" class="btn" id="submitBtn">パスワードを変更</button>

      <div class="loading" id="loading">
        処理中...
      </div>
    </form>

    <div class="back-to-login">
      <a href="/">ログイン画面に戻る</a>
    </div>
  </div>

  <script>
    // URLからトークンを取得
    function getTokenFromURL() {
      const urlParams = new URLSearchParams(window.location.search);
      const hash = window.location.hash;

      // Supabaseからのリダイレクトの場合、トークンはURLフラグメントに含まれる
      if (hash) {
        const hashParams = new URLSearchParams(hash.substring(1));
        return hashParams.get('access_token') || hashParams.get('token');
      }

      // または通常のクエリパラメータから取得
      return urlParams.get('token');
    }

    // アラート表示
    function showAlert(message, type = 'error') {
      const alertContainer = document.getElementById('alertContainer');
      const alertClass = type === 'success' ? 'alert-success' : 'alert-error';
      const div = document.createElement('div');
      div.className = `alert ${alertClass}`;
      div.textContent = message;
      alertContainer.innerHTML = '';
      alertContainer.appendChild(div);
    }

    // パスワード検証
    function validatePasswords() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword.length < 8) {
        showAlert('パスワードは8文字以上で入力してください');
        return false;
      }

      if (newPassword !== confirmPassword) {
        showAlert('パスワードが一致しません');
        return false;
      }

      return true;
    }

    // フォーム送信処理
    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!validatePasswords()) {
        return;
      }

      const token = getTokenFromURL();
      if (!token) {
        showAlert('無効なリセットリンクです。メールから再度アクセスしてください。');
        return;
      }

      const newPassword = document.getElementById('newPassword').value;
      const submitBtn = document.getElementById('submitBtn');
      const loading = document.getElementById('loading');

      // UIを更新
      submitBtn.disabled = true;
      loading.style.display = 'block';

      try {
        const API_BASE_URL = window.location.hostname === 'localhost'
          ? 'http://localhost:3001/api'
          : 'https://agenttree.onrender.com/api';

        const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            token: token,
            new_password: newPassword
          })
        });

        const result = await response.json();

        if (result.success) {
          showAlert('パスワードが正常に変更されました。ログイン画面に戻ってログインしてください。', 'success');

          // 3秒後にログイン画面にリダイレクト
          setTimeout(() => {
            window.location.href = '/';
          }, 3000);
        } else {
          showAlert(result.message || 'パスワードの変更に失敗しました');
          submitBtn.disabled = false;
        }
      } catch (error) {
        console.error('Reset password error:', error);
        showAlert('エラーが発生しました。もう一度お試しください。');
        submitBtn.disabled = false;
      } finally {
        loading.style.display = 'none';
      }
    });

    // ページ読み込み時にトークンをチェック
    window.addEventListener('load', () => {
      const token = getTokenFromURL();
      if (!token) {
        showAlert('リセットリンクが無効です。メールから再度アクセスしてください。');
        document.getElementById('submitBtn').disabled = true;
      }
    });
  </script>
</body>
</html>
