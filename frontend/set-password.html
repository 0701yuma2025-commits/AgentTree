<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード設定 - AgentTree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .set-password-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-0);
            padding: 20px;
            position: relative;
        }
        .set-password-container::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow-strong), transparent 70%);
            bottom: -150px;
            left: -150px;
            pointer-events: none;
        }
        .set-password-box {
            background: var(--surface-1);
            padding: 2.5rem;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
            font-family: var(--font-heading);
            font-size: 1.4rem;
            color: var(--text-0);
            font-weight: 700;
        }
        .password-requirements {
            background: var(--surface-2);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1.25rem;
            font-size: 0.8rem;
            border: 1px solid var(--border);
        }
        .requirement {
            margin: 4px 0;
            color: var(--text-3);
        }
        .requirement.met {
            color: var(--success);
        }
        .requirement.met::before {
            content: "\2713 ";
        }
        .requirement:not(.met)::before {
            content: "\25CB ";
        }
        .btn-submit {
            width: 100%;
            padding: 0.7rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            color: var(--surface-0);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: var(--font-body);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-submit:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }
        .btn-submit:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .alert-error {
            background: rgba(248, 113, 113, 0.1);
            color: var(--error);
            border: 1px solid rgba(248, 113, 113, 0.3);
        }
        .alert-success {
            background: rgba(52, 211, 153, 0.1);
            color: var(--success);
            border: 1px solid rgba(52, 211, 153, 0.3);
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
            color: var(--text-2);
        }
        .loading.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="set-password-container">
        <div class="set-password-box">
            <div class="logo">営業代理店管理システム</div>
            <h2 style="text-align: center; margin-bottom: 30px;">パスワード設定</h2>

            <div id="alertBox"></div>

            <form id="setPasswordForm">
                <div class="password-requirements">
                    <strong>パスワードの要件：</strong>
                    <div class="requirement" data-check="length">8文字以上</div>
                    <div class="requirement" data-check="uppercase">大文字を1文字以上含む</div>
                    <div class="requirement" data-check="lowercase">小文字を1文字以上含む</div>
                    <div class="requirement" data-check="number">数字を1文字以上含む</div>
                    <div class="requirement" data-check="special">特殊文字(!@#$%^&*など)を1文字以上含む</div>
                </div>

                <div class="form-group">
                    <label for="password">新しいパスワード</label>
                    <input type="password" id="password" name="password" required>
                    <div class="password-strength" id="passwordStrength"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">パスワード（確認）</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">パスワードを設定する</button>
            </form>

            <div class="loading" id="loading">
                処理中...
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost'
          ? 'http://localhost:3001/api'
          : 'https://agenttree.onrender.com/api';

        // URLからトークンを取得
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showAlert('無効なリンクです。管理者にお問い合わせください。', 'error');
            document.getElementById('setPasswordForm').style.display = 'none';
        }

        // パスワード強度チェック
        function checkPasswordStrength(password) {
            const checks = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)
            };

            // 要件表示を更新
            Object.keys(checks).forEach(key => {
                const element = document.querySelector(`.requirement[data-check="${key}"]`);
                if (checks[key]) {
                    element.classList.add('met');
                } else {
                    element.classList.remove('met');
                }
            });

            // 強度判定
            const metCount = Object.values(checks).filter(v => v).length;
            const strengthElement = document.getElementById('passwordStrength');

            if (metCount === 5) {
                strengthElement.textContent = '強度: 強い';
                strengthElement.className = 'password-strength strength-strong';
                return true;
            } else if (metCount >= 4) {
                strengthElement.textContent = '強度: 中';
                strengthElement.className = 'password-strength strength-medium';
                return false;
            } else {
                strengthElement.textContent = '強度: 弱い';
                strengthElement.className = 'password-strength strength-weak';
                return false;
            }
        }

        // パスワード入力時のリアルタイムチェック
        document.getElementById('password').addEventListener('input', (e) => {
            const isValid = checkPasswordStrength(e.target.value);
            document.getElementById('submitBtn').disabled = !isValid;
        });

        // アラート表示
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            alertBox.style.display = 'block';
        }

        // フォーム送信処理
        document.getElementById('setPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // パスワード一致確認
            if (password !== confirmPassword) {
                showAlert('パスワードが一致しません', 'error');
                return;
            }

            // パスワード強度確認
            if (!checkPasswordStrength(password)) {
                showAlert('パスワードが要件を満たしていません', 'error');
                return;
            }

            // 送信処理
            document.getElementById('loading').classList.add('active');
            document.getElementById('submitBtn').disabled = true;

            try {
                const response = await fetch(`${API_URL}/auth/set-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showAlert('パスワードが設定されました。ログインページに移動します...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    showAlert(data.message || 'パスワード設定に失敗しました', 'error');
                    document.getElementById('submitBtn').disabled = false;
                }
            } catch (error) {
                showAlert('エラーが発生しました。もう一度お試しください。', 'error');
                document.getElementById('submitBtn').disabled = false;
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        });
    </script>
</body>
</html>
